server {
    listen 80;
    server_name saloneventos.cloud;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Bloque crítico para los comprobantes
    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
        # Si el archivo existe, lo sirve. Si no, tira 404 directo.
        try_files $uri =404;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}