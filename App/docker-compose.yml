version: '3.8'

services:
  db:
    image: postgres:15.6
    container_name: salon_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DEV_DB}
    env_file:
      - ../App/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../App/db_init:/docker-entrypoint-initdb.d
    networks:
      - red1
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DEV_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0
    container_name: redis_service
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    env_file:
      - ../App/.env
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    networks:
      - red1
    restart: always

  app:
    container_name: salon_app
    build:
      context: ../App
      dockerfile: Dockerfile
    env_file:
      - ../App/.env
    # --- CAMBIO AQUÍ: Volumen para persistencia de comprobantes ---
    volumes:
      - .:/app
      - ./uploads:/app/uploads
    working_dir: /app
    command: >
      gunicorn --bind 0.0.0.0:5000 
      --workers 3 
      --threads 2 
      --timeout 120 
      --access-logfile - 
      --error-logfile - 
      app:app
    networks:
      - red1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.salonapp.rule=Host(`saloneventos.cloud`) && PathPrefix(`/api`)"
      - "traefik.http.routers.salonapp.entrypoints=websecure"
      - "traefik.http.routers.salonapp.tls.certresolver=leresolver"
      - "traefik.http.services.salonapp.loadbalancer.server.port=5000"

  frontend:
    container_name: salon_frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    # --- CAMBIO AQUÍ: Mismo volumen para que Nginx pueda mostrar las fotos ---
    volumes:
      - ../App/uploads:/usr/share/nginx/html/uploads:ro
    networks:
      - red1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`saloneventos.cloud`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=leresolver"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  traefik:
    image: traefik:v2.11
    container_name: traefik
    environment:
      - DOCKER_API_VERSION=1.44
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.leresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.leresolver.acme.email=tu-email@gmail.com"
      - "--certificatesresolvers.leresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./certs:/letsencrypt"
    networks:
      - red1
    restart: always

networks:
  red1:
    driver: bridge

volumes:
  postgres_data: